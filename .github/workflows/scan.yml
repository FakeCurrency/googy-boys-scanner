name: Scheduled scan

# Runs the scanner twice daily, commits the fresh data, and pushing to main
# triggers Cloudflare Pages to redeploy the site automatically.
on:
  schedule:
    # Twice daily at 6:30am and 4:30pm AEST (UTC+10). GitHub cron is fixed UTC,
    # so during AEDT (summer) these effectively run at 7:30am / 5:30pm local.
    - cron: "30 20 * * *"   # 06:30 AEST
    - cron: "30 6 * * *"    # 16:30 AEST
  workflow_dispatch:
    inputs:
      args:
        description: "Extra args for scanner.run (e.g. --market crypto --limit 12 for a quick test)"
        default: ""
        required: false

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GBS_SMTP_HOST: ${{ secrets.GBS_SMTP_HOST }}
          GBS_SMTP_PORT: ${{ secrets.GBS_SMTP_PORT }}
          GBS_SMTP_USER: ${{ secrets.GBS_SMTP_USER }}
          GBS_SMTP_PASS: ${{ secrets.GBS_SMTP_PASS }}
          GBS_ALERT_TO: ${{ secrets.GBS_ALERT_TO }}
        run: python -m scanner.run --journal --alert ${{ github.event.inputs.args }}

      - name: Commit & push fresh data (triggers Cloudflare deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data journal/journal.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
