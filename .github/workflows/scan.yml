name: Scheduled scan

# ASX and NASDAQ are downloaded and scanned in parallel, cutting wall-clock
# time roughly in half.  The scalp scan, journal, broker sync, and Telegram
# notify run sequentially once both market scans finish.
# Pushing to main triggers Cloudflare Pages to redeploy the site automatically.
on:
  schedule:
    # Every 30 min during trading hours (UTC). GitHub cron is best-effort, may be a few mins late.
    # ASX  10:00 AM–4:00 PM AEST  = 00:00–06:00 UTC
    # NASDAQ 9:30 AM–4:00 PM ET   = 13:30–21:00 UTC  (EDT; add 1h in EST winter)
    - cron: "0,30 0-5 * * 1-5"   # ASX  00:00–05:30 UTC (every 30 min)
    - cron: "30 6 * * 1-5"        # ASX  06:30 UTC = 4:30 PM AEST (closing alert)
    - cron: "30 13 * * 1-5"       # NASDAQ open  13:30 UTC
    - cron: "0,30 14-20 * * 1-5"  # NASDAQ 14:00–20:30 UTC (every 30 min)
    - cron: "0 21 * * 1-5"        # NASDAQ close 21:00 UTC
  workflow_dispatch:
    inputs:
      args:
        description: "Extra args for scanner.run (e.g. --market asx --limit 12 for a quick test)"
        default: ""
        required: false

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Refresh the market-cap cache FIRST, on a fresh IP — Yahoo throttles its
      # fundamentals endpoint after the heavy scan download, so fetching caps
      # here (before the scan) is the reliable window. Reads the previous scan's
      # A+/A symbols; the persistent cache fills in over a couple of runs.
      - name: Refresh market-cap cache
        continue-on-error: true
        run: python -m scanner.marketcaps

      - name: Run market scans (ASX + NASDAQ in parallel)
        env:
          GBS_SMTP_HOST: ${{ secrets.GBS_SMTP_HOST }}
          GBS_SMTP_PORT: ${{ secrets.GBS_SMTP_PORT }}
          GBS_SMTP_USER: ${{ secrets.GBS_SMTP_USER }}
          GBS_SMTP_PASS: ${{ secrets.GBS_SMTP_PASS }}
          GBS_ALERT_TO: ${{ secrets.GBS_ALERT_TO }}
        run: |
          python -m scanner.run --market asx --no-scalp ${{ github.event.inputs.args }} &
          PID_ASX=$!
          python -m scanner.run --market nasdaq --no-scalp ${{ github.event.inputs.args }} &
          PID_NAS=$!
          wait $PID_ASX; RC_ASX=$?
          wait $PID_NAS; RC_NAS=$?
          [ "$RC_ASX" -eq 0 ] && [ "$RC_NAS" -eq 0 ]

      - name: Scalp scan
        run: python -m scanner.run --scalp-only

      - name: Update paper-trade journal
        run: python -m scanner.journal

      - name: Swing trade alerts (Telegram)
        continue-on-error: true
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scanner.notify

      - name: Commit & push fresh data (triggers Cloudflare deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data journal/journal.json journal/scalp_journal.json data/notified_signals.json data/market_caps.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
