name: Scheduled scan

# Runs the scanner twice daily, commits the fresh data, and pushing to main
# triggers Cloudflare Pages to redeploy the site automatically.
on:
  schedule:
    # Every 30 min during trading hours (UTC). GitHub cron is best-effort, may be a few mins late.
    # ASX  10:00 AM–4:00 PM AEST  = 00:00–06:00 UTC
    # NASDAQ 9:30 AM–4:00 PM ET   = 13:30–21:00 UTC  (EDT; add 1h in EST winter)
    - cron: "0,30 0-5 * * 1-5"   # ASX  00:00–05:30 UTC (every 30 min)
    - cron: "30 13 * * 1-5"       # NASDAQ open  13:30 UTC
    - cron: "0,30 14-20 * * 1-5"  # NASDAQ 14:00–20:30 UTC (every 30 min)
    - cron: "0 21 * * 1-5"        # NASDAQ close 21:00 UTC
  workflow_dispatch:
    inputs:
      args:
        description: "Extra args for scanner.run (e.g. --market crypto --limit 12 for a quick test)"
        default: ""
        required: false

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GBS_SMTP_HOST: ${{ secrets.GBS_SMTP_HOST }}
          GBS_SMTP_PORT: ${{ secrets.GBS_SMTP_PORT }}
          GBS_SMTP_USER: ${{ secrets.GBS_SMTP_USER }}
          GBS_SMTP_PASS: ${{ secrets.GBS_SMTP_PASS }}
          GBS_ALERT_TO: ${{ secrets.GBS_ALERT_TO }}
        run: python -m scanner.run --journal --alert ${{ github.event.inputs.args }}

      - name: Broker sync (Alpaca paper — no-op if secrets not configured)
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          # ALPACA_LIVE: set to "true" only at deliberate go-live
        run: python -m scanner.broker.paper_run

      - name: Commit & push fresh data (triggers Cloudflare deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data journal/journal.json journal/scalp_journal.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
