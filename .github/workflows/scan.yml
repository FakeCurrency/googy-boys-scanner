name: Scheduled scan

# ASX and NASDAQ are downloaded and scanned in parallel, cutting wall-clock
# time roughly in half.  The scalp scan, journal, broker sync, and Telegram
# notify run sequentially once both market scans finish.
# Pushing to main triggers Cloudflare Pages to redeploy the site automatically.
on:
  schedule:
    # Hourly during trading hours (UTC). GitHub cron is best-effort, may be a few mins late.
    # ASX  10:00 AM–4:00 PM AEST  = 00:00–06:00 UTC
    # NASDAQ 9:30 AM–4:00 PM ET   = 13:30–21:00 UTC  (EDT; add 1h in EST winter)
    - cron: "0 0-5 * * 1-5"      # ASX  00:00–05:00 UTC (hourly)
    - cron: "30 6 * * 1-5"        # ASX  06:30 UTC = 4:30 PM AEST (closing alert)
    - cron: "30 13 * * 1-5"       # NASDAQ open  13:30 UTC
    - cron: "0 14-20 * * 1-5"     # NASDAQ 14:00–20:00 UTC (hourly)
    - cron: "0 21 * * 1-5"        # NASDAQ close 21:00 UTC
  workflow_dispatch:
    inputs:
      market:
        description: "Market to scan"
        default: "all"
        required: false
        type: choice
        options: ["all", "asx", "nasdaq", "crypto"]
      args:
        description: "Extra args for scanner.run (e.g. --limit 12 for a quick test)"
        default: ""
        required: false

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  # Markets are closed on weekends, so scheduled stock scans there are pointless.
  # GitHub's scheduler can also fire delayed/batched runs into Saturday/Sunday —
  # this gate skips those. Manual (workflow_dispatch / SCAN button) runs are
  # always allowed, any day. Crypto stays live 24/7 via crypto_scalp.yml.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          DOW=$(date -u +%u)   # 1=Mon … 6=Sat 7=Sun
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$DOW" -ge 6 ]; then
            echo "Weekend scheduled run — skipping stock scan (crypto runs 24/7 separately)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  scan:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Last-good per-ticker frame cache: tickers Yahoo throttles out of one run
      # are reused from here so coverage stays high. Keyed by run number so each
      # run restores the most recent cache and writes an updated one.
      - name: Restore frame cache
        uses: actions/cache@v4
        with:
          path: .cache/frames
          key: vivek-frames-${{ github.run_id }}
          restore-keys: |
            vivek-frames-

      # Refresh the market-cap cache FIRST, on a fresh IP — Yahoo throttles its
      # fundamentals endpoint after the heavy scan download, so fetching caps
      # here (before the scan) is the reliable window. Reads the previous scan's
      # A+/A symbols; the persistent cache fills in over a couple of runs.
      - name: Refresh market-cap cache
        continue-on-error: true
        run: python -m scanner.marketcaps

      - name: Run market scans (small markets first, then ASX uncontended)
        env:
          GBS_SMTP_HOST: ${{ secrets.GBS_SMTP_HOST }}
          GBS_SMTP_PORT: ${{ secrets.GBS_SMTP_PORT }}
          GBS_SMTP_USER: ${{ secrets.GBS_SMTP_USER }}
          GBS_SMTP_PASS: ${{ secrets.GBS_SMTP_PASS }}
          GBS_ALERT_TO: ${{ secrets.GBS_ALERT_TO }}
        run: |
          set +e
          MARKET="${{ github.event.inputs.market }}"
          MARKET="${MARKET:-all}"     # scheduled runs have no input -> full cycle

          if [ "$MARKET" != "all" ]; then
            # Single-market scan (fast path) — just the one the user asked for.
            echo "Single-market scan: $MARKET"
            python -m scanner.run --market "$MARKET" ${{ github.event.inputs.args }}
            exit $?
          fi

          # Full cycle. Yahoo throttles concurrent requests and each market now
          # downloads ONCE (deep history reused for VIVEK). Still, scan the two
          # SMALL markets (≈100 names) together first — they finish in a couple of
          # minutes — THEN run ASX alone with Yahoo to itself for best coverage.
          python -m scanner.run --market nasdaq ${{ github.event.inputs.args }} &
          PID_NAS=$!
          python -m scanner.run --market crypto ${{ github.event.inputs.args }} &
          PID_CRY=$!
          wait $PID_NAS; RC_NAS=$?
          wait $PID_CRY; RC_CRY=$?
          echo "small markets done — nasdaq=$RC_NAS crypto=$RC_CRY; now ASX alone"
          python -m scanner.run --market asx ${{ github.event.inputs.args }}
          RC_ASX=$?
          echo "scan rc: asx=$RC_ASX nasdaq=$RC_NAS crypto=$RC_CRY"
          # Crypto is best-effort (keyless feeds can be flaky); ASX+NASDAQ gate the job.
          [ "$RC_ASX" -eq 0 ] && [ "$RC_NAS" -eq 0 ]

      # Schema gate: every freshly written *_vivek.json must carry the current
      # schema_version. Catches a code/data drift (the bug that hid the entry-type
      # filter) before it ships, instead of after.
      - name: Verify VIVEK data schema
        run: |
          python - <<'PY'
          import json, glob, sys
          from scanner import config
          want = config.VIVEK_SCHEMA_VERSION
          bad = []
          for f in glob.glob("public/data/*_vivek.json"):
              try:
                  v = json.load(open(f)).get("schema_version")
              except Exception as e:
                  bad.append(f"{f}: unreadable ({e})"); continue
              if v != want:
                  bad.append(f"{f}: schema_version {v} != expected {want}")
          if bad:
              print("SCHEMA GATE FAILED:"); [print(" -", b) for b in bad]; sys.exit(1)
          print(f"schema gate OK — all *_vivek.json at v{want}")
          PY

      # NOTE: the paper-trade journal, Telegram alerts and Discord digest read the
      # retired pullback/reversal/short scans, which the VIVEK-only pipeline no
      # longer produces. They are disabled until VIVEK-native versions are wired
      # (see ROADMAP). Re-enabling them as-is would act on stale legacy JSON.
      #
      #   - name: Update paper-trade journal
      #     run: python -m scanner.journal
      #   - name: Swing trade alerts (Telegram)
      #     run: python -m scanner.notify
      #   - name: Discord digest (new A+/A setups)
      #     run: python -m scanner.discord

      - name: Commit & push fresh data (triggers Cloudflare deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only this scan's generated outputs — never code or other files.
          PATHS="public/data journal/vivek_journal.json journal/journal.json journal/scalp_journal.json journal/discord_state.json data/notified_signals.json data/market_caps.json"
          git add $PATHS 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          SHA=$(git rev-parse HEAD)
          # Generated data is fully recomputed each run, so the latest scan simply
          # wins: rebase onto the freshest main and re-apply our outputs on top.
          # This avoids the merge/modify-delete conflicts a plain rebase hits when
          # scans race. Retry the push in case another scan lands first.
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for p in $PATHS; do
              [ -e "$p" ] && git rm -rq --ignore-unmatch -- "$p" 2>/dev/null || true
              git checkout "$SHA" -- "$p" 2>/dev/null || true
            done
            git add -A
            if git diff --cached --quiet; then echo "Nothing new vs main."; exit 0; fi
            git commit -m "data: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git push origin HEAD:main; then echo "Pushed."; exit 0; fi
            echo "Push race — retry $i"; sleep $((i * 3))
          done
          echo "Could not push after retries"; exit 1
