name: Scheduled scan

# Runs the scanner twice daily, commits the fresh data, and pushing to main
# triggers Cloudflare Pages to redeploy the site automatically.
on:
  schedule:
    # Five daily scans, in AEST (UTC+10). GitHub cron is fixed UTC, so during
    # AEDT/daylight-saving (Oct–Apr) these effectively fire 1 hour later in
    # Sydney local time. GitHub cron is also best-effort and can run a few
    # minutes late under load.
    - cron: "30 20 * * *"   # 06:30 AEST  (20:30 UTC prev day)
    - cron: "30 2 * * *"    # 12:30 AEST  (02:30 UTC)
    - cron: "30 6 * * *"    # 16:30 AEST  (06:30 UTC)
    - cron: "30 14 * * *"   # 00:30 AEST  (14:30 UTC prev day)
    - cron: "30 16 * * *"   # 02:30 AEST  (16:30 UTC prev day)
  workflow_dispatch:
    inputs:
      args:
        description: "Extra args for scanner.run (e.g. --market crypto --limit 12 for a quick test)"
        default: ""
        required: false

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GBS_SMTP_HOST: ${{ secrets.GBS_SMTP_HOST }}
          GBS_SMTP_PORT: ${{ secrets.GBS_SMTP_PORT }}
          GBS_SMTP_USER: ${{ secrets.GBS_SMTP_USER }}
          GBS_SMTP_PASS: ${{ secrets.GBS_SMTP_PASS }}
          GBS_ALERT_TO: ${{ secrets.GBS_ALERT_TO }}
        run: python -m scanner.run --journal --alert ${{ github.event.inputs.args }}

      - name: Commit & push fresh data (triggers Cloudflare deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data journal/journal.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
