name: Crypto scalp scan (24/7)

# Runs every 30 minutes, all hours, all days — crypto never sleeps.
# Writes public/data/scalp_crypto.json and pushes to trigger a Cloudflare deploy.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-scalp
  cancel-in-progress: true   # if previous run is still going, the newer data wins

jobs:
  crypto-scalp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Crypto scalp scan
        run: python -m scanner.run --crypto-scalp-only

      - name: Bybit execution (testnet by default — set BYBIT_TESTNET=false for live)
        if: ${{ env.BYBIT_API_KEY != '' }}
        continue-on-error: true   # broker errors must never block data publishing
        env:
          BYBIT_API_KEY:    ${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
          BYBIT_TESTNET:    ${{ secrets.BYBIT_TESTNET }}
        run: python -m scanner.broker.bybit_run

      - name: Commit & push fresh crypto data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PATHS="public/data/scalp_crypto.json public/data/scalp_journal.json journal/scalp_journal.json"
          git add $PATHS 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No signal changes — skipping commit."
            exit 0
          fi
          git commit -m "data: crypto scalp $(date -u +'%Y-%m-%d %H:%M UTC')"
          SHA=$(git rev-parse HEAD)
          # Latest scan wins: rebase onto freshest main, re-apply our file, retry
          # the push if another scan lands first. Avoids merge/rebase conflicts.
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for p in $PATHS; do
              [ -e "$p" ] && git rm -rq --ignore-unmatch -- "$p" 2>/dev/null || true
              git checkout "$SHA" -- "$p" 2>/dev/null || true
            done
            git add -A
            if git diff --cached --quiet; then echo "Nothing new vs main."; exit 0; fi
            git commit -m "data: crypto scalp $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git push origin HEAD:main; then echo "Pushed."; exit 0; fi
            echo "Push race — retry $i"; sleep $((i * 3))
          done
          echo "Could not push after retries"; exit 1
