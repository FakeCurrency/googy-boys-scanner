<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chart — Vivek 5.0</title>
  <meta name="theme-color" content="#080b11" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=51" />
  <link rel="stylesheet" href="css/chart.css?v=25" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="chart-body">
  <header class="chart-top">
    <a class="back-link" href="index.html">← Dashboard</a>
    <span class="ct-nav" id="ct-nav" hidden>
      <button class="ct-nav-btn" id="ct-prev" type="button" title="Previous setup (←)" aria-label="Previous setup">‹</button>
      <span class="ct-nav-pos" id="ct-nav-pos"></span>
      <button class="ct-nav-btn" id="ct-next" type="button" title="Next setup (→)" aria-label="Next setup">›</button>
    </span>
    <span class="ct-sym" id="ct-sym">—</span>
    <span class="badge sector" id="ct-sector" hidden></span>
    <span class="ct-price" id="ct-price">—</span>
    <span class="ct-live" id="ct-live" hidden>● LIVE</span>
    <span class="ct-delayed" id="ct-delayed" hidden title="Yahoo Finance quotes are delayed ~15 minutes">~15m delayed</span>
    <span class="ct-grade" id="ct-grade"></span>
    <span class="badge dir" id="ct-dir" hidden>LONG</span>
    <span class="ct-hiconv" id="ct-hiconv" hidden title="Weekly reclaim that's A/A+ or has strong structure — the best-performing setup in the backtest">🎯 HIGH CONVICTION</span>
    <span class="ct-fundwarn" id="ct-fundwarn" hidden title="REIT / ETF / LIC / managed fund — the bot won't trade these and most CFD brokers (e.g. CMC) don't list them">⚠ FUND / REIT</span>
    <span class="ct-chips" id="ct-chips"></span>
  </header>

  <div class="tf-toggle" id="tf-toggle" role="tablist" aria-label="Timeframe"></div>

  <main class="chart-main">
    <div class="chart-legend" id="chart-legend"></div>
    <!-- temporary drawing tools (not persisted) -->
    <div class="draw-tools" id="draw-tools" hidden>
      <button class="draw-btn is-active" data-tool="cursor" type="button" title="Cursor / pan (Esc)">▱</button>
      <button class="draw-btn" data-tool="trend" type="button" title="Trendline">╱</button>
      <button class="draw-btn" data-tool="hline" type="button" title="Horizontal line">─</button>
      <button class="draw-btn draw-measure" data-tool="measure" type="button" title="Measure — drag between two points for % move &amp; time">📏</button>
      <button class="draw-btn draw-erase" data-tool="erase" type="button" title="Eraser — click a drawing to delete it">⌫</button>
      <button class="draw-btn draw-clear" id="draw-clear" type="button" title="Clear all drawings">✕</button>
    </div>
    <div class="chart-canvas" id="chart"></div>
  </main>

  <footer class="chart-foot">
    <div class="cf-metrics" id="cf-metrics"></div>
    <p class="cf-analysis" id="cf-analysis"></p>
    <div class="cf-actions">
      <span id="cf-lowrr"></span>
      <button class="sim-btn sim-buy"  id="cf-sim-buy"  type="button">▲ Simulate Buy</button>
      <button class="sim-btn sim-sell" id="cf-sim-sell" type="button" disabled>▼ Simulate Sell</button>
      <span class="sim-status" id="cf-sim-status"></span>
      <a class="tv-btn" id="cf-tv" target="_blank" rel="noopener">Open in TradingView ↗</a>
    </div>
    <a class="sim-journal-link" id="cf-sim-journal" href="journal.html">View in My Trades journal →</a>
    <p class="cf-tvnote" id="cf-tvnote" hidden></p>
    <p class="cf-disclaimer">General information only — not financial advice.</p>
  </footer>

  <script src="js/gbs-sync.js?v=5"></script>
  <script src="js/chart.js?v=59"></script>
</body>
</html>
